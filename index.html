<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Regency Life: Dynasty Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=IM+Fell+English&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #fdfaf5; --parchment: #f2e8d5; --ink: #1a1208;
            --gold: #9a7d3a; --burgundy: #6b1f2a; --sage: #4a6741;
        }
        body { 
            background: var(--ink); font-family: 'Cormorant Garamond', serif; 
            color: var(--ink); margin: 0; display: flex; justify-content: center;
        }
        #game-container { 
            background: var(--cream); width: 100%; max-width: 900px; 
            min-height: 100vh; display: flex; flex-direction: column; 
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        
        /* Header & Stats */
        header { 
            background: var(--ink); color: var(--parchment); padding: 15px 25px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 3px solid var(--gold); position: sticky; top: 0; z-index: 10;
        }
        .stat-grid { display: flex; gap: 20px; font-size: 0.9rem; }
        .stat-item { text-align: center; }
        .stat-val { display: block; font-weight: bold; color: var(--gold); }

        /* Main Layout */
        .main-layout { display: grid; grid-template-columns: 1fr 280px; flex-grow: 1; }
        .feed-sector { padding: 20px; border-right: 1px solid var(--parchment); }
        .sidebar { padding: 20px; background: var(--parchment); }

        /* Components */
        .event-card { 
            background: white; padding: 20px; margin-bottom: 15px; 
            border: 1px solid var(--gold); border-radius: 2px;
            animation: fadeIn 0.5s ease;
        }
        .char-link { 
            display: block; padding: 8px; margin-bottom: 5px;
            background: white; border: 1px solid #d4c9a8;
            cursor: pointer; transition: 0.2s; font-weight: 600;
        }
        .char-link:hover { background: var(--gold); color: white; }
        
        .btn { 
            padding: 10px 15px; border: 1px solid var(--gold); 
            background: white; cursor: pointer; font-family: inherit;
            margin: 5px 0; width: 100%; text-align: left;
        }
        .btn:hover { background: var(--parchment); }
        .btn-age { 
            background: var(--burgundy); color: white; border: none;
            font-family: 'IM Fell English'; font-size: 1.2rem; cursor: pointer;
            padding: 10px 25px;
        }

        /* Modals */
        .modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
            display: none; align-items: center; justify-content: center; z-index: 100;
        }
        .modal-content { 
            background: var(--cream); padding: 30px; border: 2px solid var(--gold);
            width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="setup-screen" style="position:fixed; inset:0; background:var(--ink); color:white; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:200;">
    <h1 style="font-family:'IM Fell English'; font-size: 3.5rem; color:var(--gold);">Regency Dynasty</h1>
    <div style="background:var(--parchment); padding:30px; color:var(--ink); border-radius:5px;">
        <input type="text" id="in-fname" placeholder="First Name" style="padding:10px; width:200px;">
        <input type="text" id="in-lname" placeholder="Surname" style="padding:10px; width:200px;">
        <select id="in-gender" style="padding:10px;">
            <option value="Female">Female</option>
            <option value="Male">Male</option>
        </select>
        <button onclick="initGame()" class="btn-age" style="display:block; margin: 20px auto 0;">Begin Life</button>
    </div>
</div>

<div id="game-container" style="display:none;">
    <header>
        <div>
            <div id="ui-full-name" style="font-family:'IM Fell English'; font-size:1.4rem;"></div>
            <div id="ui-title" style="color:var(--gold); font-size:0.9rem; letter-spacing:1px;"></div>
        </div>
        <div class="stat-grid">
            <div class="stat-item">AGE<span class="stat-val" id="stat-age">0</span></div>
            <div class="stat-item">FUNDS<span class="stat-val" id="stat-money">£0</span></div>
            <div class="stat-item">REP<span class="stat-val" id="stat-rep">50%</span></div>
            <button class="btn-age" onclick="ageUp()">Age Up</button>
        </div>
    </header>

    <div class="main-layout">
        <div class="feed-sector" id="event-feed"></div>
        <div class="sidebar">
            <h3 style="border-bottom:1px solid var(--gold); padding-bottom:5px;">Connections</h3>
            <div id="conn-list"></div>
        </div>
    </div>
</div>

<div id="profile-modal" class="modal">
    <div class="modal-content">
        <h2 id="prof-name" style="font-family:'IM Fell English'; color:var(--burgundy);"></h2>
        <p id="prof-desc" style="font-style:italic; border-bottom:1px solid var(--gold); padding-bottom:10px;"></p>
        <div id="prof-stats" style="margin: 15px 0;"></div>
        <div id="prof-actions"></div>
        <button onclick="closeModal()" class="btn" style="background:#eee; text-align:center;">Back</button>
    </div>
</div>

<script>
// --- CORE DATA ---
let P = {
    fname: "", lname: "", gender: "", age: 0, year: 1810,
    money: 0, rep: 50, health: 100, fertility: 75,
    title: "Commoner", rankScore: 0,
    family: [], acquaintances: [], 
    isDead: false, spouse: null, lover: null
};

const TITLES = [
    { m: "Duke", f: "Duchess", income: 12000, rep: 90, rank: 5 },
    { m: "Earl", f: "Countess", income: 6000, rep: 80, rank: 4 },
    { m: "Viscount", f: "Viscountess", income: 4000, rep: 70, rank: 3 },
    { m: "Baron", f: "Baroness", income: 2500, rep: 60, rank: 2 },
    { m: "Gentleman", f: "Lady", income: 800, rep: 50, rank: 1 }
];

const NAMES_F = ["Sophia", "Elizabeth", "Georgiana", "Emma", "Jane", "Catherine", "Mary", "Anne", "Isabella"];
const NAMES_M = ["Fitzwilliam", "Arthur", "George", "Charles", "William", "Edward", "Henry", "Thomas"];
const SURNAMES = ["Darcy", "Wentworth", "Bingley", "Knightley", "Ferrars", "Dashwood", "Crawford"];

// --- INITIALIZATION ---
function initGame() {
    P.fname = document.getElementById('in-fname').value || "Jane";
    P.lname = document.getElementById('in-lname').value || "Austen";
    P.gender = document.getElementById('in-gender').value;

    // Randomize Nobility
    if(Math.random() > 0.4) {
        let t = TITLES[Math.floor(Math.random() * TITLES.length)];
        P.title = (P.gender === "Male" ? t.m : t.f);
        P.money = t.income;
        P.rankScore = t.rank;
        P.rep = t.rep;
    } else {
        P.money = 200;
        P.title = (P.gender === "Male" ? "Mr." : "Miss");
    }

    // Generate Family
    createPerson("Mother", "Parent");
    createPerson("Father", "Parent");
    if(Math.random() > 0.5) createPerson("Brother", "Sibling");

    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('game-container').style.display = 'flex';
    
    updateUI();
    logEvent(`Year ${P.year}: You were born into the ${P.lname} family. Your father is ${P.family[1].fname} and your mother is ${P.family[0].fname}.`);
}

function createPerson(subtype, type, forcedLname = null) {
    let gender = (subtype === "Father" || subtype === "Brother" || subtype === "Son") ? "Male" : "Female";
    let p = {
        id: Math.random().toString(36).substr(2, 9),
        fname: (gender === "Male" ? pick(NAMES_M) : pick(NAMES_F)),
        lname: forcedLname || P.lname,
        age: (type === "Parent" ? 25 + Math.floor(Math.random()*20) : (type === "Sibling" ? Math.floor(Math.random()*5) : 0)),
        type: type,
        subtype: subtype,
        rel: 50,
        rep: 50 + (Math.random()*20),
        gender: gender,
        isDead: false,
        courtshipLevel: 0
    };
    if (type === "Parent" || type === "Sibling") P.family.push(p);
    else P.acquaintances.push(p);
    return p;
}

// --- GAME LOOP ---
function ageUp() {
    if(P.isDead) return;
    P.age++;
    P.year++;
    
    // Aging Logic
    P.family.forEach(m => m.age++);
    P.acquaintances.forEach(m => m.age++);

    // Wealth / Expenses
    P.money += Math.round(P.money * 0.05); // Allowance/Interest
    if(P.age > 18) P.money -= 50; // Basic living cost

    // Random Yearly Events
    handleRandomEvents();

    // Death Checks (reduced early mortality as requested)
    if(P.age > 50 && Math.random() < (P.age/500)) die("Natural Causes");
    if(P.health < 20 && Math.random() < 0.1) die("Poor Health");

    updateUI();
}

function handleRandomEvents() {
    let r = Math.random();
    if (P.age === 6) logEvent("You have begun your studies with a private governess. She is firm but fair.");
    if (P.age === 14) logEvent("You are beginning to notice the social divide between your family and others.");
    
    if (P.age >= 17 && r < 0.3) {
        let person = createPerson("Prospect", "Social", pick(SURNAMES));
        logEvent(`At a local gathering, you were introduced to ${person.fname} ${person.lname}.`);
    }

    if (r < 0.1) {
        P.rep += (Math.random() > 0.5 ? 5 : -5);
        logEvent("A rumor regarding your family's conduct is circulating in the village.");
    }
}

// --- UI HELPERS ---
function updateUI() {
    document.getElementById('ui-full-name').innerText = `${P.fname} ${P.lname}`;
    document.getElementById('ui-title').innerText = P.title.toUpperCase();
    document.getElementById('stat-age').innerText = P.age;
    document.getElementById('stat-money').innerText = `£${P.money.toLocaleString()}`;
    document.getElementById('stat-rep').innerText = `${Math.round(P.rep)}%`;

    let connBox = document.getElementById('conn-list');
    connBox.innerHTML = "";
    
    let all = [...P.family, ...P.acquaintances].filter(x => !x.isDead);
    all.forEach(c => {
        let div = document.createElement('div');
        div.className = "char-link";
        div.innerHTML = `${c.fname} <small>(${c.subtype})</small>`;
        div.onclick = () => openProfile(c);
        connBox.appendChild(div);
    });
}

function logEvent(msg) {
    let feed = document.getElementById('event-feed');
    let card = document.createElement('div');
    card.className = "event-card";
    card.innerHTML = `<strong>Year ${P.year} (Age ${P.age})</strong><p>${msg}</p>`;
    feed.prepend(card);
}

// --- INTERACTION SYSTEM ---
function openProfile(char) {
    document.getElementById('prof-name').innerText = `${char.fname} ${char.lname}`;
    document.getElementById('prof-desc').innerText = `${char.subtype} | Age: ${char.age}`;
    document.getElementById('prof-stats').innerHTML = `
        Relationship: ${char.rel}% <br>
        Reputation: ${Math.round(char.rep)}% <br>
        ${char.subtype === 'Prospect' ? `Courtship Progress: ${char.courtshipLevel}/100` : ''}
    `;

    let actionBox = document.getElementById('prof-actions');
    actionBox.innerHTML = "";

    // Standard Interactions
    addActionButton("Spend Time", () => {
        char.rel += 5;
        logEvent(`You spent a pleasant afternoon with ${char.fname}.`);
    });

    // Romance Branch
    if (char.type === "Social") {
        addActionButton("Flirt", () => {
            if(Math.random() * 100 < P.rep) {
                char.rel += 10; char.courtshipLevel += 5;
                logEvent(`You shared a lingering look with ${char.fname}. Their interest grows.`);
            } else {
                P.rep -= 2;
                logEvent(`Your advances were ignored by ${char.fname}. How embarrassing.`);
            }
        });

        if (char.courtshipLevel > 20) {
            addActionButton("Ask to Promenade", () => {
                char.courtshipLevel += 10;
                logEvent(`You walked through the gardens with ${char.fname}. The gossips are whispering.`);
            });
        }

        if (char.courtshipLevel > 50) {
            addActionButton("Confess Feelings", () => {
                char.courtshipLevel += 20;
                logEvent(`You revealed your heart to ${char.fname}. They seem deeply moved.`);
            });
            
            addActionButton("Secret Meeting", () => {
                if(Math.random() > 0.4) {
                    char.rel += 15;
                    logEvent(`You met ${char.fname} secretly by the moonlight. A dangerous thrill!`);
                } else {
                    P.rep -= 20;
                    logEvent(`You were caught meeting ${char.fname} alone! A scandal erupts!`);
                }
            });
        }

        if (char.courtshipLevel >= 80) {
            addActionButton("Propose Marriage", () => attemptMarriage(char));
        }
    }

    // Pregnancy / Intimacy (For Spouse or Lover)
    if (char === P.spouse || char.courtshipLevel > 60) {
        addActionButton("Attempt Intimacy", () => handleIntimacy(char));
    }

    document.getElementById('profile-modal').style.display = 'flex';
}

function addActionButton(text, fn) {
    let b = document.createElement('button');
    b.className = "btn";
    b.innerText = text;
    b.onclick = () => { fn(); updateUI(); closeModal(); };
    document.getElementById('prof-actions').appendChild(b);
}

function handleIntimacy(char) {
    let scandalRisk = (char !== P.spouse);
    let pregChance = (P.fertility / 100) * 0.3;

    if (scandalRisk && Math.random() < 0.3) {
        P.rep -= 40;
        logEvent(`Your illicit liaison with ${char.fname} was discovered. You are the talk of the county!`);
    } else {
        logEvent(`A night of passion with ${char.fname}.`);
    }

    if (Math.random() < pregChance) {
        setTimeout(() => {
            logEvent("You have realized you are with child!");
            spawnChild(char);
        }, 500);
    }
}

function spawnChild(otherParent) {
    let child = createPerson(Math.random() > 0.5 ? "Son" : "Daughter", "Child", P.lname);
    P.family.push(child);
    logEvent(`You gave birth to a healthy ${child.subtype} named ${child.fname}.`);
}

function attemptMarriage(char) {
    if (P.rep < 40) {
        logEvent(`${char.fname}'s family has blocked the union due to your poor reputation.`);
    } else {
        P.spouse = char;
        char.subtype = "Spouse";
        logEvent(`The bells of the parish ring! You are now married to ${char.fname}.`);
    }
}

function die(reason) {
    P.isDead = true;
    alert(`Your journey ends here. Age: ${P.age}. Reason: ${reason}. You leave behind £${P.money} and ${P.family.filter(f=>f.type==='Child').length} heirs.`);
    location.reload();
}

function closeModal() { document.getElementById('profile-modal').style.display = 'none'; }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

</script>
</body>
</html>
